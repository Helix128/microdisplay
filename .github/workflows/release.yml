name: Build and publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'
          - platform: 'windows-latest'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'microdisplay ${{ github.ref_name }}'
          args: ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || '' }}
          releaseBody: |
            Windows:
            - Setup: [microdisplay_${{ steps.get_version.outputs.version }}_x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/microdisplay_${{ steps.get_version.outputs.version }}_x64-setup.exe)
            - Portable: [microdisplay_${{ steps.get_version.outputs.version }}_x64-portable.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/microdisplay_${{ steps.get_version.outputs.version }}_x64-portable.exe)
            
            Linux:
            - AppImage: [microdisplay_${{ steps.get_version.outputs.version }}_amd64.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/microdisplay_${{ steps.get_version.outputs.version }}_amd64.AppImage)
            - Debian/Ubuntu: [microdisplay_${{ steps.get_version.outputs.version }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/microdisplay_${{ steps.get_version.outputs.version }}_amd64.deb)
            
            macOS:
            - Apple Silicon: [microdisplay_${{ steps.get_version.outputs.version }}_aarch64.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/microdisplay_${{ steps.get_version.outputs.version }}_aarch64.dmg)
          releaseDraft: true
          prerelease: false

      - name: Upload portable Windows exe
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $filename = "microdisplay_${{ steps.get_version.outputs.version }}_x64-portable.exe"
          Copy-Item src-tauri/target/release/microdisplay.exe src-tauri/target/release/$filename
          gh release upload ${{ github.ref_name }} src-tauri/target/release/$filename --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
